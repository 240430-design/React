<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачное приложение</title>
    <style>
        /* Ваши стили остаются теми же */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .auth-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #007bff; object-fit: cover; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
        button:hover { background: #0056b3; }
        .logout-btn { background: #ff4757; padding: 8px 15px; width: auto; font-size: 14px; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .like-btn { cursor: pointer; border: none; background: #ff6b6b; color: white; padding: 6px 16px; border-radius: 20px; margin-top: 10px; }
        .time { font-size: 11px; color: #999; margin-left: auto; }
        .image-upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 20px; text-align: center; margin: 10px 0; cursor: pointer; }
        .image-preview { max-width: 100%; max-height: 200px; margin: 10px 0; border-radius: 8px; display: none; }
        .remove-image { background: #dc3545; padding: 5px 10px; font-size: 12px; width: auto; }
        .upload-progress { width: 100%; height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; margin: 10px 0; display: none; }
        .upload-progress-bar { width: 0%; height: 100%; background: #007bff; transition: width 0.3s; }
        .post-image { width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>

<div id="authSection" class="container">
    <button id="loginBtn">Войти через Google</button>
    <div id="userInfo" style="display: none;" class="auth-bar">
        <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
        <span id="userName" style="font-weight: bold;"></span>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
    </div>
</div>

<div id="messageForm" class="container" style="display: none;">
    <h3>Создать запись</h3>
    <input type="text" id="name" placeholder="Имя профиля" readonly>
    <input type="email" id="email" placeholder="Ваш Email" readonly>
    <textarea id="content" placeholder="Что у вас нового?"></textarea>
    
    <div id="imageUploadArea" class="image-upload-area">
        📸 Нажмите или перетащите изображение сюда
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>
    <img id="imagePreview" class="image-preview" alt="Preview">
    <div class="upload-progress" id="uploadProgress">
        <div class="upload-progress-bar" id="uploadProgressBar"></div>
    </div>
    <button id="removeImageBtn" class="remove-image" style="display: none;">🗑 Удалить изображение</button>
    
    <button id="mainBtn">Отправить в облако</button>
</div>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyChno_tsYbn7LOfiLdt8oJo0CpRL0lm2qo",
  authDomain: "mama-d42df.firebaseapp.com",
  projectId: "mama-d42df",
  storageBucket: "mama-d42df.firebasestorage.app",
  messagingSenderId: "803842417836",
  appId: "1:803842417836:web:ad2126821c73901a26ab09",
  measurementId: "G-C0WFW01PW4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

// DOM элементы
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const userInfo = document.getElementById('userInfo');
const messageForm = document.getElementById('messageForm');
const userNameSpan = document.getElementById('userName');
const userPhotoImg = document.getElementById('userPhoto');
const nameInput = document.getElementById('name');
const emailInput = document.getElementById('email');
const contentTextarea = document.getElementById('content');
const mainBtn = document.getElementById('mainBtn');
const feedDiv = document.getElementById('feed');
const imageInput = document.getElementById('imageInput');
const imageUploadArea = document.getElementById('imageUploadArea');
const imagePreview = document.getElementById('imagePreview');
const removeImageBtn = document.getElementById('removeImageBtn');
const uploadProgress = document.getElementById('uploadProgress');
const uploadProgressBar = document.getElementById('uploadProgressBar');

let selectedImageFile = null;

// Функция для получения аватарки (без via.placeholder.com)
function getAvatarUrl(name, photoURL) {
    if (photoURL && photoURL !== 'null') return photoURL;
    const initial = name ? name.charAt(0).toUpperCase() : '?';
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(initial)}&background=007bff&color=fff&bold=true&length=1&size=40`;
}

// Загрузка изображения
async function uploadImage(imageFile, userId) {
    return new Promise((resolve, reject) => {
        const timestamp = Date.now();
        const fileName = `${userId}_${timestamp}_${imageFile.name}`;
        const storageRef = ref(storage, `post_images/${fileName}`);
        const uploadTask = uploadBytesResumable(storageRef, imageFile);
        
        uploadProgress.style.display = 'block';
        
        uploadTask.on('state_changed',
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                uploadProgressBar.style.width = `${progress}%`;
            },
            (error) => {
                console.error("Ошибка:", error);
                uploadProgress.style.display = 'none';
                alert("Ошибка загрузки: " + error.message + "\nПроверьте CORS настройки в Firebase Storage");
                reject(error);
            },
            async () => {
                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                uploadProgress.style.display = 'none';
                resolve(downloadURL);
            }
        );
    });
}

function clearSelectedImage() {
    selectedImageFile = null;
    imagePreview.style.display = 'none';
    imagePreview.src = '';
    removeImageBtn.style.display = 'none';
    imageUploadArea.style.display = 'block';
    imageInput.value = '';
}

// Авторизация
loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
    if (user) {
        loginBtn.style.display = 'none';
        userInfo.style.display = 'flex';
        messageForm.style.display = 'block';
        
        userNameSpan.innerText = user.displayName || user.email;
        userPhotoImg.src = getAvatarUrl(user.displayName, user.photoURL);
        nameInput.value = user.displayName || '';
        emailInput.value = user.email || '';
    } else {
        loginBtn.style.display = 'block';
        userInfo.style.display = 'none';
        messageForm.style.display = 'none';
        contentTextarea.value = '';
        clearSelectedImage();
    }
});

// Обработчики изображений
imageUploadArea.onclick = () => imageInput.click();
imageInput.onchange = (e) => {
    if (e.target.files && e.target.files[0]) {
        const file = e.target.files[0];
        if (file.size > 5 * 1024 * 1024) {
            alert("Изображение не должно превышать 5MB!");
            return;
        }
        selectedImageFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            imagePreview.src = e.target.result;
            imagePreview.style.display = 'block';
            removeImageBtn.style.display = 'block';
            imageUploadArea.style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
};
removeImageBtn.onclick = () => clearSelectedImage();

// Отправка поста
mainBtn.onclick = async () => {
    const content = contentTextarea.value.trim();
    if (!content && !selectedImageFile) {
        alert("Введите текст или добавьте изображение!");
        return;
    }
    
    const user = auth.currentUser;
    if (!user) {
        alert("Авторизуйтесь!");
        return;
    }
    
    mainBtn.disabled = true;
    mainBtn.textContent = "Отправка...";
    
    try {
        let imageUrl = null;
        if (selectedImageFile) {
            imageUrl = await uploadImage(selectedImageFile, user.uid);
        }
        
        await addDoc(collection(db, "requests"), {
            name: user.displayName || "Аноним",
            email: user.email,
            photo: user.photoURL,
            text: content || "",
            imageUrl: imageUrl,
            likes: 0,
            timestamp: serverTimestamp()
        });
        
        contentTextarea.value = "";
        clearSelectedImage();
        alert("✓ Опубликовано!");
    } catch (e) {
        alert("Ошибка: " + e.message);
    } finally {
        mainBtn.disabled = false;
        mainBtn.textContent = "Отправить в облако";
    }
};

// Обработчик лайков
window.processLike = async (id) => {
    try {
        await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    } catch (e) {
        alert("Ошибка лайка: " + e.message);
    }
};

// Загрузка постов
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
    if (snapshot.empty) {
        feedDiv.innerHTML = '<div class="container" style="text-align:center;">Нет записей</div>';
        return;
    }
    
    let html = '';
    snapshot.forEach((doc) => {
        const data = doc.data();
        const timestamp = data.timestamp?.toDate();
        const formattedTime = timestamp ? timestamp.toLocaleString('ru-RU') : 'Только что';
        
        html += `
            <div class="post">
                <div class="post-header">
                    <img src="${getAvatarUrl(data.name, data.photo)}" class="post-avatar" alt="avatar">
                    <b>${escapeHtml(data.name || 'Аноним')}</b>
                    <span class="time">${formattedTime}</span>
                </div>
                <div class="post-text">${escapeHtml(data.text || '')}</div>
                ${data.imageUrl ? `<img src="${data.imageUrl}" class="post-image" alt="image">` : ''}
                <button class="like-btn" onclick="processLike('${doc.id}')">
                    ❤️ ${data.likes || 0}
                </button>
            </div>
        `;
    });
    feedDiv.innerHTML = html;
});

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>
</body>
</html>
