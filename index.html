<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bad5c</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button#mainBtn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button#mainBtn:hover:not(:disabled) {
            background: #0069d9;
        }
        button#mainBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .post {
            border: 1px solid #eaeaea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            width: 100%;
        }
        .like-btn {
            cursor: pointer;
            border: none;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            transition: 0.2s;
        }
        .like-btn:hover {
            background: #e2e6ea;
        }
        .time {
            font-size: 11px;
            color: #999;
            float: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Панель управления данными</h3>
        
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        
        <button id="mainBtn">Опубликовать в облако</button>

        <div id="feed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc,
            query,
            orderBy,
            onSnapshot,
            serverTimestamp,
            updateDoc,
            doc,
            increment
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyChno_tsYbn7LOfiLdt8oJo0CpRL0lm2qo",
  authDomain: "mama-d42df.firebaseapp.com",
  projectId: "mama-d42df",
  storageBucket: "mama-d42df.firebasestorage.app",
  messagingSenderId: "803842417836",
  appId: "1:803842417836:web:ad2126821c73901a26ab09",
  measurementId: "G-C0WFW01PW4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Лайк
        window.processLike = async (id) => {
            try {
                const docRef = doc(db, "requests", id);
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) {
                console.error("Ошибка лайка:", e);
                alert("Не удалось поставить лайк");
            }
        };

        // Отправка
        document.getElementById("mainBtn").addEventListener("click", async () => {
            const btn = document.getElementById("mainBtn");
            const nameVal = document.getElementById("name").value.trim();
            const emailVal = document.getElementById("email").value.trim();

            if (!nameVal || nameVal.length < 2) {
                alert("Имя должно содержать минимум 2 символа");
                return;
            }
            if (!emailVal || !emailVal.includes("@")) {
                alert("Введите корректный email");
                return;
            }
            btn.disabled = true;
            btn.textContent = "Отправка...";

            try {
                await addDoc(collection(db, "requests"), {
                    name: nameVal,
                    email: emailVal,
                    likes: 0,
                    timestamp: serverTimestamp()
                });

                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
                alert("✅ Опубликовано успешно!");
            } catch (e) {
                console.error(e);
                alert("Ошибка при отправке: " + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Опубликовать в облако";
            }
        });

        // Реал-тайм лента
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id;

                let timeStr = "только что";
                if (data.timestamp) {
                    try {
                        const date = data.timestamp.toDate();
                        timeStr = date.toLocaleString("ru-RU", { 
                            hour: "2-digit", 
                            minute: "2-digit", 
                            day: "numeric", 
                            month: "short" 
                        });
                    } catch (err) {}
                }

                const postHTML = `
    <div class="post">
        <b>${data.name || 'Аноним'}</b>
        <p style="margin: 5px 0 8px;">${data.email || ''}</p>
        
        <button class="like-btn" onclick="processLike('${docId}')">
            👍 ${data.likes || 0}
        </button>
        
        <span class="time">${timeStr}</span>
    </div>
`;
                feed.innerHTML += postHTML;
            });
        });
    </script>
</body>
</html>
